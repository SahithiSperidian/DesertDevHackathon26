{% extends "base.html" %}
{% block title %}Login — GroundUp{% endblock %}

{% block content %}
<div class="gu-auth-wrapper d-flex align-items-center justify-content-center py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-5">

        <div class="text-center mb-4">
          <a href="{{ url_for('auth.index') }}" class="text-decoration-none">
            <span class="gu-auth-logo"><i class="bi bi-flower1 me-2"></i>GroundUp</span>
          </a>
          <h2 class="fw-bold mt-3">Welcome back</h2>
          <p class="text-muted">Sign in to your account</p>
        </div>

        <div class="gu-auth-card">
          <form method="POST" action="{{ url_for('auth.login') }}" novalidate>

            <div class="mb-3">
              <label for="email" class="form-label fw-medium">Email address</label>
              <div class="input-group">
                <span class="input-group-text gu-input-icon"><i class="bi bi-envelope"></i></span>
                <input
                  type="email"
                  class="form-control gu-input"
                  id="email"
                  name="email"
                  placeholder="you@example.com"
                  required
                  autocomplete="email"
                />
              </div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label fw-medium">Password</label>
              <div class="input-group">
                <span class="input-group-text gu-input-icon"><i class="bi bi-lock"></i></span>
                <input
                  type="password"
                  class="form-control gu-input"
                  id="password"
                  name="password"
                  placeholder="••••••••"
                  required
                  autocomplete="current-password"
                />
                <button class="btn gu-pw-toggle" type="button" id="togglePassword" tabindex="-1">
                  <i class="bi bi-eye" id="toggleIcon"></i>
                </button>
              </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember" name="remember" />
                <label class="form-check-label text-muted small" for="remember">Remember me</label>
              </div>
            </div>

            <button type="submit" class="btn btn-success w-100 gu-btn-primary">
              <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>

          </form>

          <hr class="gu-divider my-4" />

          <p class="text-center text-muted mb-0 small">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}" class="text-success fw-semibold">Create one free</a>
          </p>
        </div>

      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  const toggleBtn = document.getElementById('togglePassword');
  const pwInput = document.getElementById('password');
  const toggleIcon = document.getElementById('toggleIcon');

  toggleBtn.addEventListener('click', () => {
    const isHidden = pwInput.type === 'password';
    pwInput.type = isHidden ? 'text' : 'password';
    toggleIcon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
  });
</script>
{% endblock %}
